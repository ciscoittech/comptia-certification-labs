name: iptables-firewall-basics

topology:
  nodes:
    # Firewall
    firewall:
      kind: linux
      image: alpine:latest
      ports:
        - 2221:22  # SSH access
      exec:
        - apk update
        - apk add --no-cache iproute2 iputils iptables iptables-legacy nginx tcpdump openssh busybox-extras
        - ip addr add 10.1.1.1/24 dev eth1
        - ip addr add 10.2.2.1/24 dev eth2
        - sysctl -w net.ipv4.ip_forward=1
        # Default DROP policy (using iptables-legacy directly)
        - /usr/sbin/iptables-legacy -P INPUT ACCEPT
        - /usr/sbin/iptables-legacy -P FORWARD DROP
        - /usr/sbin/iptables-legacy -P OUTPUT ACCEPT
        # Allow established/related connections
        - /usr/sbin/iptables-legacy -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT
        # Allow HTTP from client to webserver
        - /usr/sbin/iptables-legacy -A FORWARD -i eth1 -o eth2 -p tcp --dport 80 -j ACCEPT
        # Allow ping from client to webserver
        - /usr/sbin/iptables-legacy -A FORWARD -i eth1 -o eth2 -p icmp -j ACCEPT
        # Configure SSH
        - echo 'root:cisco' | chpasswd
        - sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        - ssh-keygen -A
        - /usr/sbin/sshd

    # Webserver
    webserver:
      kind: linux
      image: alpine:latest
      exec:
        - apk update
        - apk add --no-cache iproute2 iputils nginx busybox-extras
        - ip addr add 10.2.2.10/24 dev eth1
        - ip route replace default via 10.2.2.1
        # Start nginx
        - mkdir -p /run/nginx /var/www/html
        - echo "<h1>Welcome to the webserver!</h1>" > /var/www/html/index.html
        - nginx

    # Client
    client:
      kind: linux
      image: alpine:latest
      exec:
        - apk update
        - apk add --no-cache iproute2 iputils tcpdump curl nmap busybox-extras
        - ip addr add 10.1.1.10/24 dev eth1
        - ip route replace default via 10.1.1.1

  links:
    - endpoints: ["firewall:eth1", "client:eth1"]
    - endpoints: ["firewall:eth2", "webserver:eth1"]
