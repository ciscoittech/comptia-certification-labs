name: dhcp-configuration

topology:
  nodes:
    # DHCP Server - dnsmasq-based DHCP service
    dhcp-server:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache dnsmasq iproute2 iputils
        - ip addr add 10.1.1.1/24 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - sh -c 'printf "interface=eth1\ndhcp-range=10.1.1.100,10.1.1.200,255.255.255.0,12h\ndhcp-option=option:router,10.1.1.1\ndhcp-option=option:dns-server,8.8.8.8\ndhcp-host=AA:BB:CC:DD:EE:01,10.1.1.50,reserved-host\nlog-dhcp\n" > /etc/dnsmasq.conf'
        - dnsmasq --no-daemon --log-facility=/var/log/dnsmasq.log &

    # Client 1 - DHCP client (will request an address)
    client1:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils
        - udhcpc -i eth1 -n -q

    # Client 2 - DHCP client
    client2:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils
        - udhcpc -i eth1 -n -q

    # Client 3 - DHCP client
    client3:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2 iputils
        - udhcpc -i eth1 -n -q

  links:
    - endpoints: ["dhcp-server:eth1", "client1:eth1"]
    - endpoints: ["dhcp-server:eth2", "client2:eth1"]
    - endpoints: ["dhcp-server:eth3", "client3:eth1"]
